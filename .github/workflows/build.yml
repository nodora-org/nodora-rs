name: build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  GO_VERSION: "1.24.4"

jobs:
  build-linux:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            container: quay.io/pypa/manylinux_2_28_x86_64
            goarch: amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
            container: quay.io/pypa/manylinux_2_28_aarch64
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - name: Trust workspace
        run: git config --global --add safe.directory '*'
      - name: Install Go
        run: |
          curl -fsSL "https://go.dev/dl/go${GO_VERSION}.linux-${{ matrix.goarch }}.tar.gz" \
            | tar -C /usr/local -xz
          echo /usr/local/go/bin >> "$GITHUB_PATH"

      - name: Build c-archive
        working-directory: bridge
        env:
          CGO_ENABLED: "1"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p "$GITHUB_WORKSPACE/dist"
          go build -buildmode=c-archive \
            -o "$GITHUB_WORKSPACE/dist/libnodora-${{ matrix.target }}.a" .

      - name: Checksum
        working-directory: dist
        run: |
          sha256sum "libnodora-${{ matrix.target }}.a" | awk '{print $1}' > "libnodora-${{ matrix.target }}.a.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  build-macos:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-13
            goarch: amd64
            deployment: "10.15"
          - target: aarch64-apple-darwin
            os: macos-14
            goarch: arm64
            deployment: "11.0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build c-archive
        working-directory: bridge
        env:
          CGO_ENABLED: "1"
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment }}
        run: |
          mkdir -p "$GITHUB_WORKSPACE/dist"
          go build -buildmode=c-archive \
            -o "$GITHUB_WORKSPACE/dist/libnodora-${{ matrix.target }}.a" .

      - name: Checksum
        working-directory: dist
        run: |
          shasum -a 256 "libnodora-${{ matrix.target }}.a" | awk '{print $1}' > "libnodora-${{ matrix.target }}.a.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: attach to release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
